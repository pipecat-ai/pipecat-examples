[project]
name = "plivo-chatbot-dial-in"
version = "0.1.0"
description = "Plivo dial-in example for Pipecat"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pipecat-ai[websocket,cartesia,openai,silero,deepgram,runner]>=1.4.0",
  "pipecatcloud>=0.7.1"
]

[dependency-groups]
dev = [
    "pyright>=1.1.404,<2",
    "ruff>=0.12.11,<1",
]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["I", "UP"]
