[project]
name = "word-wrangler"
version = "0.1.0"
description = "Word Wrangler guessing game powered by Gemini"
requires-python = ">=3.11"
dependencies = [
    "pipecat-ai[daily,silero,google,runner]>=1.4.0",
    "pipecatcloud>=0.7.1"
]

[dependency-groups]
dev = [
    "ruff~=0.12.1",
]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["I"]