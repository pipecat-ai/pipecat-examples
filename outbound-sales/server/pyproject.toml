[project]
name = "outbound-sales"
version = "0.1.0"
description = "Voice AI bot built with Pipecat"
requires-python = ">=3.11"
dependencies = [
    # TODO: switch to "pipecat-ai[cli,cartesia,daily,deepgram,openai,runner,silero]>=1.4.0"
    # once 1.4.0 is on PyPI. The CLI (with `pipecat eval`) and the eval transport
    # are only on main until then.
    "pipecat-ai[cli,cartesia,daily,deepgram,openai,runner,silero] @ git+https://github.com/pipecat-ai/pipecat.git@main",
    "pipecatcloud",
]

[dependency-groups]
dev = [
    "pyright>=1.1.404,<2",
    "ruff>=0.12.11,<1",
]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["I", "UP"]